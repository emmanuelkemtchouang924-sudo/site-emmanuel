// Chargement de React / ReactDOM / Babel avec plusieurs sources de secours,
// au cas où un CDN précis serait bloqué par un opérateur ou un réseau local.
function loadScriptWithFallback(urls, index, onDone, onFail) {
  if (index >= urls.length) { onFail(new Error("Toutes les sources ont échoué pour : " + urls[0])); return; }
  var s = document.createElement('script');
  s.src = urls[index];
  s.onload = onDone;
  s.onerror = function() { loadScriptWithFallback(urls, index + 1, onDone, onFail); };
  document.head.appendChild(s);
}

function showError(e) {

    '</div>';
  console.error(e);
}

function startApp() {
  try {
    var source = atob(APP_SOURCE_B64);
    source = decodeURIComponent(escape(source));
    var transformed = Babel.transform(source, { presets: [['react', { runtime: 'classic' }]] }).code;
    (0, eval)(transformed);
    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(DiagProApp));
  } catch (e) {
    showError(e);
  }
}

loadScriptWithFallback(SOURCES.react, 0, function() {

  }, showError);
}, showError);
